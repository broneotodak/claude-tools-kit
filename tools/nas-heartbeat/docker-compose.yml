# nas-heartbeat — drop-in compose for Ugreen NAS Container Manager
# Deploy: paste this file via Ugreen Container Manager → Compose → Create.
# Set the two NEO_BRAIN_* env vars in the GUI before starting.
# After first run, command.neotodak.com fleet view should show nas-ugreen flip from "never" → "active" within 60s.

services:
  nas-heartbeat:
    image: alpine:3.20
    container_name: nas-heartbeat
    restart: unless-stopped
    network_mode: host  # so probes reach 127.0.0.1:3000 (gitea), :9000 (minio), :3001 (kuma) directly
    volumes:
      - ./heartbeat.sh:/heartbeat.sh:ro
    environment:
      NEO_BRAIN_URL: "${NEO_BRAIN_URL}"
      NEO_BRAIN_SERVICE_ROLE_KEY: "${NEO_BRAIN_SERVICE_ROLE_KEY}"
      INTERVAL: "60"
      # When network_mode=host, probes go to 127.0.0.1 directly:
      GITEA_URL: "http://127.0.0.1:3000/api/v1/version"
      MINIO_URL: "http://127.0.0.1:9000/minio/health/live"
      KUMA_URL: "http://127.0.0.1:3001/"
    command: ["sh", "-c", "apk add --no-cache curl >/dev/null && exec sh /heartbeat.sh"]
